name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [go, javascript-typescript]
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}

  dependencies:
    name: Dependencies and source
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 10.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"
          cache: true
      - run: pnpm install --frozen-lockfile
      - name: Production dependency audit
        run: pnpm audit --prod --audit-level high
      - name: Go vulnerability analysis
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Filesystem and configuration scan
        # Pinned to the verified-safe commit for v0.35.0, not a mutable tag: in
        # March 2026 an attacker force-pushed 76 of 77 trivy-action version
        # tags (including the previously-pinned 0.32.0) to malware-serving
        # commits. v0.35.0 was the only tag left untouched. Do not move this
        # back to a bare version tag — see aquasecurity/trivy/security/advisories/GHSA-69fq-xp46-6x23.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: anchore/sbom-action@v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: paritylab.spdx.json
          upload-artifact: true
