name: paritylab-persistence-test

services:
  postgres-test:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: paritylab
      POSTGRES_USER: paritylab
      POSTGRES_PASSWORD: paritylab_test_only
    volumes:
      - postgres-test-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paritylab -d paritylab"]
      interval: 2s
      timeout: 3s
      retries: 30
    restart: "no"

  api-test:
    image: golang:1.26-alpine
    working_dir: /src
    command: ["go", "run", "./services/api/cmd/paritylab"]
    environment:
      DATABASE_URL: postgres://paritylab:paritylab_test_only@postgres-test:5432/paritylab?sslmode=disable
      PARITYLAB_MIGRATIONS_DIR: /src/db/migrations
      API_ADDRESS: ":8080"
      PARITYLAB_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      PARITYLAB_ALLOW_STRIPE_MOCK: "true"
      STRIPE_API_BASE: http://stripe-mock:12111
      WEB_ORIGIN: "http://127.0.0.1:3203"
      PARITYLAB_INSECURE_COOKIES: "true"
    ports:
      - "${PARITYLAB_PERSISTENCE_API_PORT:-18081}:8080"
    volumes:
      - ../:/src:ro
      - go-test-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    depends_on:
      postgres-test:
        condition: service_healthy
      stripe-mock:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=/dev/null http://127.0.0.1:8080/healthz"]
      interval: 2s
      timeout: 3s
      retries: 180
    restart: "no"

  stripe-mock:
    image: node:24-alpine
    working_dir: /src
    command: ["node", "tests/mocks/stripe-server.mjs"]
    environment:
      PORT: "12111"
    volumes:
      - ../:/src:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:12111/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 3s
      retries: 30
    restart: "no"

volumes:
  postgres-test-data:
  go-test-cache:
  go-mod-cache:
