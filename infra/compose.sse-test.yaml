name: paritylab-sse-test

services:
  postgres-sse-test:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: paritylab
      POSTGRES_USER: paritylab
      POSTGRES_PASSWORD: paritylab_sse_test_only
    volumes:
      - postgres-sse-test-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paritylab -d paritylab"]
      interval: 2s
      timeout: 3s
      retries: 30
    restart: "no"

  stripe-sse-mock:
    image: node:24-alpine
    working_dir: /src
    command: ["node", "tests/mocks/stripe-server.mjs"]
    environment:
      PORT: "12111"
    volumes:
      - ../:/src:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:12111/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 3s
      retries: 30
    restart: "no"

  api-sse-test:
    image: golang:1.26-alpine
    working_dir: /src
    command: ["go", "run", "./services/api/cmd/paritylab"]
    environment:
      DATABASE_URL: postgres://paritylab:paritylab_sse_test_only@postgres-sse-test:5432/paritylab?sslmode=disable
      PARITYLAB_MIGRATIONS_DIR: /src/db/migrations
      API_ADDRESS: ":8080"
      WEB_ORIGIN: "${PARITYLAB_SSE_WEB_ORIGIN:-http://127.0.0.1:3206}"
      PARITYLAB_INSECURE_COOKIES: "true"
      PARITYLAB_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      PARITYLAB_ALLOW_STRIPE_MOCK: "true"
      STRIPE_API_BASE: http://stripe-sse-mock:12111
      STRIPE_WEBHOOK_SECRET: whsec_sse_reconnect_contract
      STRIPE_ENDPOINT_TOKEN: sse-contract
    ports:
      - "${PARITYLAB_SSE_API_PORT:-18088}:8080"
    volumes:
      - ../:/src:ro
      - go-sse-test-cache:/root/.cache/go-build
      - go-sse-mod-cache:/go/pkg/mod
    depends_on:
      postgres-sse-test:
        condition: service_healthy
      stripe-sse-mock:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=/dev/null http://127.0.0.1:8080/healthz"]
      interval: 2s
      timeout: 3s
      retries: 180
    restart: "no"

  worker-sse-test:
    image: golang:1.26-alpine
    working_dir: /src
    command: ["go", "run", "./services/api/cmd/worker"]
    environment:
      DATABASE_URL: postgres://paritylab:paritylab_sse_test_only@postgres-sse-test:5432/paritylab?sslmode=disable
      PARITYLAB_MIGRATIONS_DIR: /src/db/migrations
      PARITYLAB_SIGNING_SECRET: sse-reference-signing-secret
      PARITYLAB_WORKER_ID: sse-reconnect-contract-worker
    volumes:
      - ../:/src:ro
      - go-sse-test-cache:/root/.cache/go-build
      - go-sse-mod-cache:/go/pkg/mod
    depends_on:
      postgres-sse-test:
        condition: service_healthy
    restart: "no"

volumes:
  postgres-sse-test-data:
  go-sse-test-cache:
  go-sse-mod-cache:
