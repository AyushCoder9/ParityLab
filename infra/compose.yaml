name: paritylab

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: paritylab
      POSTGRES_USER: paritylab
      POSTGRES_PASSWORD: ${PARITYLAB_POSTGRES_PASSWORD:-paritylab_dev_only}
    ports:
      - "${PARITYLAB_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paritylab -d paritylab"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks: [paritylab]

  redpanda:
    image: redpandadata/redpanda:v25.1.9
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=768M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "${PARITYLAB_REDPANDA_PORT:-19092}:19092"
      - "${PARITYLAB_REDPANDA_ADMIN_PORT:-9644}:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks: [paritylab]

  clickhouse:
    image: clickhouse/clickhouse-server:25.6-alpine
    environment:
      CLICKHOUSE_DB: paritylab
      CLICKHOUSE_USER: paritylab
      CLICKHOUSE_PASSWORD: ${PARITYLAB_CLICKHOUSE_PASSWORD:-paritylab_dev_only}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "${PARITYLAB_CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${PARITYLAB_CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/config.d/paritylab.xml:/etc/clickhouse-server/config.d/paritylab.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks: [paritylab]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.131.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel/collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "${PARITYLAB_OTLP_GRPC_PORT:-4317}:4317"
      - "${PARITYLAB_OTLP_HTTP_PORT:-4318}:4318"
      - "${PARITYLAB_OTEL_METRICS_PORT:-8889}:8889"
    depends_on:
      tempo:
        condition: service_started
    restart: unless-stopped
    networks: [paritylab]

  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PARITYLAB_PROMETHEUS_PORT:-9090}:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks: [paritylab]

  tempo:
    image: grafana/tempo:2.8.2
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "${PARITYLAB_TEMPO_PORT:-3200}:3200"
    restart: unless-stopped
    networks: [paritylab]

  grafana:
    image: grafana/grafana:12.1.0
    environment:
      GF_SECURITY_ADMIN_USER: ${PARITYLAB_GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${PARITYLAB_GRAFANA_PASSWORD:-paritylab_dev_only}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${PARITYLAB_GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
      - tempo
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks: [paritylab]

volumes:
  postgres-data:
  redpanda-data:
  clickhouse-data:
  prometheus-data:
  tempo-data:
  grafana-data:

networks:
  paritylab:
    driver: bridge
