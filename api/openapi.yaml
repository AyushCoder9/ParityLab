openapi: 3.1.0
info:
  title: ParityLab API
  version: 0.1.0
  description: Deterministic verification for Stripe integrations.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      operationId: health
      responses:
        '200':
          description: Healthy
  /v1/overview:
    get:
      operationId: getOverview
      responses:
        '200':
          description: Seeded project overview
  /v1/scenarios:
    get:
      operationId: listScenarios
      responses:
        '200':
          description: Scenario catalog
  /v1/runs:
    post:
      operationId: createRun
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string, minLength: 8, maxLength: 255 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scenario_id]
              properties:
                scenario_id: { type: string }
                fault: { type: string, enum: [none, duplicate, reorder, timeout, tamper] }
      responses:
        '201': { description: Run created or replayed; replay responses include Idempotent-Replayed }
        '400': { $ref: '#/components/responses/Error' }
  /v1/runs/{run_id}:
    get:
      operationId: getRun
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200': { description: Run detail }
        '404': { $ref: '#/components/responses/Error' }
  /v1/runs/{run_id}/events:
    get:
      operationId: streamRunEvents
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Server-sent run events
          content:
            text/event-stream: {}
  /v1/runs/{run_id}/report:
    get:
      operationId: getRunReport
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200': { description: Evidence report }
  /hooks/stripe/{endpoint_token}:
    post:
      operationId: ingestStripeWebhook
      parameters:
        - in: path
          name: endpoint_token
          required: true
          schema: { type: string }
        - in: header
          name: Stripe-Signature
          required: true
          schema: { type: string }
      responses:
        '200': { description: Verified and accepted; response identifies duplicate delivery }
        '400': { $ref: '#/components/responses/Error' }
components:
  parameters:
    RunId:
      in: path
      name: run_id
      required: true
      schema: { type: string }
  responses:
    Error:
      description: Stripe-style error response
      content:
        application/json:
          schema:
            type: object
            required: [error]
            properties:
              error:
                type: object
                required: [type, code, message, request_id]
                properties:
                  type: { type: string }
                  code: { type: string }
                  message: { type: string }
                  param: { type: [string, 'null'] }
                  request_id: { type: string }
